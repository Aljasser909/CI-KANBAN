<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CI KANBAN</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2333;
  --border:rgba(255,255,255,.08);--text:#e6edf3;--muted:#8b949e;--accent:#3b82f6;
  --c0:#64748b;--c1:#f59e0b;--c2:#3b82f6;--c3:#a855f7;--c4:#22c55e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.topbar-title{font-size:15px;font-weight:700;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-blue{background:var(--accent);color:#fff}
.btn-green{background:#22c55e;color:#000}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid var(--border)}

/* ── BODY SCROLL ── */
.page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ── BOARD (horizontal scroll on mobile) ── */
.board-section{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 0}
.board{display:flex;gap:10px;align-items:flex-start;width:max-content;min-width:100%;padding-bottom:4px}

/* ── COLUMN ── */
.col{width:220px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:12px;transition:border-color .2s,background .2s}
.col.drag-over{border-color:var(--accent);background:rgba(59,130,246,.06)}
.col-head{padding:11px 12px 9px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)}
.col-bar{width:3px;height:14px;border-radius:3px;flex-shrink:0}
.col-lbl{font-size:12px;font-weight:600;flex:1}
.col-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.07);color:var(--muted)}
.col-body{padding:7px;display:flex;flex-direction:column;gap:6px;min-height:44px}
.col-add{margin:0 7px 9px;padding:6px;background:none;border:1px dashed rgba(255,255,255,.09);border-radius:7px;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.col-add:hover{border-color:var(--accent);color:#93c5fd;background:rgba(59,130,246,.05)}
.empty-hint{padding:14px 8px;text-align:center;color:rgba(255,255,255,.14);font-size:11px;pointer-events:none}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 11px;cursor:grab;user-select:none;transition:box-shadow .15s,transform .15s,border-color .15s;position:relative}
.card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.4);border-color:rgba(255,255,255,.16)}
.card.dragging{opacity:.3;transform:scale(.97);cursor:grabbing}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:7px}
.card-title{font-size:12px;font-weight:500;line-height:1.55;flex:1;direction:rtl}
.card-menu{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 2px;border-radius:4px;line-height:1;opacity:0;transition:opacity .12s;flex-shrink:0;font-family:inherit}
.card:hover .card-menu,.card-menu:focus{opacity:1}
.card-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px;direction:rtl}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;padding-top:7px;border-top:1px solid rgba(255,255,255,.05)}
.pchip{font-size:9px;font-weight:700;letter-spacing:.4px;padding:2px 7px;border-radius:4px}
.pchip.high{background:rgba(239,68,68,.12);color:#f87171}
.pchip.med{background:rgba(245,158,11,.12);color:#fbbf24}
.pchip.low{background:rgba(34,197,94,.12);color:#4ade80}
.cdate{font-size:10px;color:var(--muted)}
.cdate.late{color:#f87171}
.assignee-chip{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;direction:rtl}
.assignee-chip::before{content:'👤';font-size:10px}

/* ── STATS (below board) ── */
.stats-section{padding:14px 14px 6px}
.stats-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:380px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.stat-card-dot{width:7px;height:7px;border-radius:50%;margin-bottom:6px}
.stat-card-val{font-size:22px;font-weight:700;line-height:1}
.stat-card-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.stat-card-pct{font-size:11px;font-weight:600;margin-top:3px}

/* ── CHART ── */
.chart-row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.donut-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:14px;flex:0 0 auto}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-val{font-size:26px;font-weight:700;line-height:1}
.donut-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.legend{display:flex;flex-direction:column;gap:7px;width:100%}
.leg-row{display:flex;align-items:center;justify-content:space-between}
.leg-l{display:flex;align-items:center;gap:7px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:11px}
.leg-r{display:flex;gap:6px;align-items:center}
.leg-n{font-size:12px;font-weight:600}
.leg-pct{font-size:10px;color:var(--muted);min-width:28px;text-align:left}

.completion-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;flex:1;min-width:200px}
.completion-box h3{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.big-pct{font-size:44px;font-weight:700;line-height:1;color:var(--c4);margin-bottom:10px}
.track{height:8px;background:rgba(255,255,255,.07);border-radius:8px;overflow:hidden;margin-bottom:8px}
.fill{height:100%;border-radius:8px;transition:width .5s cubic-bezier(.4,0,.2,1);background:var(--c4)}
.completion-sub{font-size:11px;color:var(--muted)}

/* ── BOTTOM SPACE ── */
.spacer{height:30px}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;place-items:center;padding:16px}
.overlay.open{display:grid}
.modal{background:var(--surface);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:20px;width:100%;max-width:400px;direction:rtl;display:flex;flex-direction:column;gap:12px;animation:pop .18s ease;max-height:90vh;overflow-y:auto}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:15px;font-weight:700}
.modal-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;border-radius:6px;padding:2px 6px;font-family:inherit}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;color:var(--muted);font-weight:500}
.field input,.field textarea,.field select{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;direction:rtl;transition:border-color .15s;width:100%;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:rgba(59,130,246,.05)}
.field textarea{resize:vertical;min-height:60px}
.field select option{background:#1c2333}
.frow{display:flex;gap:10px}
.frow .field{flex:1}
.modal-actions{display:flex;gap:8px;padding-top:4px}
.btn-cancel2{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:inherit}

/* ── CTX MENU ── */
.ctx{display:none;position:fixed;background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:5px;z-index:600;min-width:150px;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:fadeIn .12s ease}
.ctx.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1}}
.ctx-item{padding:9px 13px;font-size:13px;color:var(--text);cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;direction:rtl;transition:background .1s}
.ctx-item:hover{background:rgba(255,255,255,.07)}
.ctx-item.danger{color:#f87171}
.ctx-item.danger:hover{background:rgba(239,68,68,.1)}
.ctx-sep{height:1px;background:var(--border);margin:4px 6px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1c2333;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 18px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:700;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── LOADING OVERLAY ── */
#az-loading{position:fixed;inset:0;background:rgba(13,17,23,.9);z-index:900;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#az-loading p{color:var(--muted);font-size:13px}
.az-spinner{width:34px;height:34px;border:3px solid rgba(59,130,246,.18);border-top-color:var(--accent);border-radius:50%;animation:az-spin .75s linear infinite}
@keyframes az-spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="az-loading">
  <div class="az-spinner"></div>
  <p>جاري التحميل من السحابة…</p>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-title">CI KANBAN</span>
  <div class="topbar-right">
    <button class="btn btn-green" onclick="azRefresh()">🔄 تحديث</button>
    <button class="btn btn-blue" onclick="openModal()">+ مهمة</button>
  </div>
</div>

<!-- SCROLLABLE PAGE -->
<div class="page">

  <!-- BOARD -->
  <div class="board-section">
    <div class="board" id="board"></div>
  </div>

  <!-- STATS -->
  <div class="stats-section" id="stats-section">
    <div class="stats-title">الإحصائيات</div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-row">
      <div class="donut-box">
        <div class="donut-wrap">
          <svg id="donut-svg" width="150" height="150" viewBox="0 0 150 150"></svg>
          <div class="donut-center">
            <div class="donut-val" id="d-total">0</div>
            <div class="donut-lbl">مهمة</div>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
      <div class="completion-box">
        <h3>نسبة الإنجاز</h3>
        <div class="big-pct" id="big-pct">0%</div>
        <div class="track"><div class="fill" id="pct-fill" style="width:0%"></div></div>
        <div class="completion-sub" id="completion-sub">0 من 0 مهمة مكتملة</div>
      </div>
    </div>
  </div>

  <div class="spacer"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-ttl">مهمة جديدة</h2>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="field">
      <label>العنوان *</label>
      <input id="f-title" type="text" placeholder="اكتب عنوان المهمة…"/>
    </div>
    <div class="field">
      <label>الوصف</label>
      <textarea id="f-desc" placeholder="تفاصيل إضافية…"></textarea>
    </div>
    <div class="frow">
      <div class="field">
        <label>العمود</label>
        <select id="f-col">
          <option value="backlog">قائمة الانتظار</option>
          <option value="todo">للتنفيذ</option>
          <option value="inprog">قيد التنفيذ</option>
          <option value="review">قيد المراجعة</option>
          <option value="done">مكتمل</option>
        </select>
      </div>
      <div class="field">
        <label>الأولوية</label>
        <select id="f-priority">
          <option value="high">🔴 عالية</option>
          <option value="med" selected>🟡 متوسطة</option>
          <option value="low">🟢 منخفضة</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="field">
        <label>المسؤول</label>
        <input id="f-assignee" type="text" placeholder="اسم المسؤول…"/>
      </div>
      <div class="field">
        <label>تاريخ الاستحقاق</label>
        <input id="f-date" type="date"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-blue" onclick="saveCard()">حفظ</button>
      <button class="btn-cancel2" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- CTX MENU -->
<div class="ctx" id="ctx">
  <div class="ctx-item" onclick="ctxEdit()">✏️ تعديل</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑 حذف</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   AZURE TABLE STORAGE CONFIG
   ══════════════════════════════════════ */
const AZ_ACCOUNT = 'kanbanstore123';
const AZ_TABLE   = 'kanbanTasks';
const AZ_SAS     = 'sv=2026-02-06&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2027-06-24T18:23:19Z&st=2026-06-24T10:08:19Z&spr=https&sig=ILmk9veYJDpMB%2BUOxgVEV1yXriy48fj03jY1ndQdUCc%3D';
const AZ_BASE    = `https://${AZ_ACCOUNT}.table.core.windows.net/${AZ_TABLE}`;

/* ══════════════════════════════════════
   STATE
   ══════════════════════════════════════ */
const COLS=[
  {id:'backlog',label:'قائمة الانتظار',color:'#64748b'},
  {id:'todo',   label:'للتنفيذ',        color:'#f59e0b'},
  {id:'inprog', label:'قيد التنفيذ',    color:'#3b82f6'},
  {id:'review', label:'قيد المراجعة',   color:'#a855f7'},
  {id:'done',   label:'مكتمل',           color:'#22c55e'},
];
const PRI_AR={high:'عالية',med:'متوسطة',low:'منخفضة'};
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

let cards=[], dragging=null, activeCtx=null, editing=null;

function genId(){
  return 'T' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

/* ══════════════════════════════════════
   AZURE HELPERS
   ══════════════════════════════════════ */
function cardToEntity(card){
  return {
    PartitionKey: 'tasks',
    RowKey:       String(card.id),
    title:        card.title     || '',
    desc:         card.desc      || '',
    colId:        card.colId     || 'backlog',
    priority:     card.priority  || 'med',
    assignee:     card.assignee  || '',
    date:         card.date      || ''
  };
}

async function azFetchAll(){
  const res = await fetch(`${AZ_BASE}?${AZ_SAS}`, {
    headers: { 'Accept': 'application/json;odata=nometadata' }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return (data.value || []).map(e => ({
    id:       e.RowKey,
    title:    e.title    || '',
    desc:     e.desc     || '',
    colId:    e.colId    || 'backlog',
    priority: e.priority || 'med',
    assignee: e.assignee || '',
    date:     e.date     || ''
  }));
}

async function azInsert(card){
  const res = await fetch(`${AZ_BASE}?${AZ_SAS}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept':       'application/json;odata=nometadata'
    },
    body: JSON.stringify(cardToEntity(card))
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

async function azUpdate(card){
  const key = encodeURIComponent(String(card.id));
  const res = await fetch(
    `${AZ_BASE}(PartitionKey='tasks',RowKey='${key}')?${AZ_SAS}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Accept':       'application/json;odata=nometadata',
        'If-Match':     '*'
      },
      body: JSON.stringify(cardToEntity(card))
    }
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

async function azDelete(id){
  const key = encodeURIComponent(String(id));
  const res = await fetch(
    `${AZ_BASE}(PartitionKey='tasks',RowKey='${key}')?${AZ_SAS}`, {
      method: 'DELETE',
      headers: {
        'Accept':   'application/json;odata=nometadata',
        'If-Match': '*'
      }
    }
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

/* ══════════════════════════════════════
   LOADING / REFRESH
   ══════════════════════════════════════ */
function setLoading(on){
  document.getElementById('az-loading').style.display = on ? 'flex' : 'none';
}

async function azRefresh(){
  setLoading(true);
  try {
    cards = await azFetchAll();
    render();
    toast('☁️ تم التحديث');
  } catch(e){
    console.error('Azure load error:', e);
    toast('⚠️ تعذّر الاتصال – تأكد من إعداد CORS');
  }
  setLoading(false);
}

/* ══════════════════════════════════════
   BUILD BOARD
   ══════════════════════════════════════ */
function buildBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  COLS.forEach(col => {
    const d = document.createElement('div');
    d.className = 'col'; d.id = 'col-' + col.id;
    d.innerHTML = `
      <div class="col-head">
        <div class="col-bar" style="background:${col.color}"></div>
        <span class="col-lbl">${col.label}</span>
        <span class="col-badge" id="badge-${col.id}">0</span>
      </div>
      <div class="col-body" id="body-${col.id}"></div>
      <button class="col-add" onclick="openModal('${col.id}')">＋ إضافة</button>`;
    const body = d.querySelector('.col-body');
    body.addEventListener('dragover', e => { e.preventDefault(); d.classList.add('drag-over'); });
    body.addEventListener('dragleave', () => d.classList.remove('drag-over'));
    body.addEventListener('drop', async () => {
      d.classList.remove('drag-over');
      if (dragging) {
        dragging.colId = col.id;
        render();
        try { await azUpdate(dragging); }
        catch(e){ console.error('Azure update (drag):', e); toast('⚠️ خطأ في تحديث المهمة'); }
      }
    });
    board.appendChild(d);
  });
}

/* ══════════════════════════════════════
   RENDER
   ══════════════════════════════════════ */
function render(){
  COLS.forEach(col => {
    const body  = document.getElementById('body-'  + col.id);
    const badge = document.getElementById('badge-' + col.id);
    const cc    = cards.filter(c => c.colId === col.id);
    body.innerHTML = '';
    if (!cc.length) body.innerHTML = '<div class="empty-hint">لا توجد مهام</div>';
    else cc.forEach(c => body.appendChild(mkCard(c)));
    badge.textContent = cc.length;
  });
  updateStats();
}

function mkCard(c){
  const el = document.createElement('div');
  el.className = 'card'; el.dataset.id = c.id; el.draggable = true;
  const today = new Date(); today.setHours(0,0,0,0);
  let dateHtml = '';
  if (c.date){
    const d = new Date(c.date + 'T00:00:00');
    const late = d < today;
    dateHtml = `<span class="cdate${late?' late':''}">${late?'⚠ ':''}${d.getDate()} ${MONTHS[d.getMonth()]}</span>`;
  }
  el.innerHTML = `
    <div class="card-top">
      <div class="card-title">${esc(c.title)}</div>
      <button class="card-menu" onclick="openCtx(event,'${c.id}')">⋯</button>
    </div>
    ${c.desc    ? `<div class="card-desc">${esc(c.desc)}</div>`         : ''}
    ${c.assignee? `<div class="assignee-chip">${esc(c.assignee)}</div>`: ''}
    <div class="card-foot">
      <span class="pchip ${c.priority}">${PRI_AR[c.priority]}</span>
      ${dateHtml}
    </div>`;
  el.addEventListener('dragstart', () => {
    dragging = c;
    requestAnimationFrame(() => el.classList.add('dragging'));
  });
  el.addEventListener('dragend', () => { el.classList.remove('dragging'); dragging = null; });
  return el;
}

/* ══════════════════════════════════════
   STATS + CHART
   ══════════════════════════════════════ */
function updateStats(){
  const total = cards.length;
  const grid  = document.getElementById('stats-grid');
  grid.innerHTML = '';
  COLS.forEach(col => {
    const n   = cards.filter(c => c.colId === col.id).length;
    const pct = total ? Math.round(n / total * 100) : 0;
    const cell = document.createElement('div');
    cell.className = 'stat-card';
    cell.innerHTML = `<div class="stat-card-dot" style="background:${col.color}"></div>
      <div class="stat-card-val">${n}</div>
      <div class="stat-card-lbl">${col.label}</div>
      <div class="stat-card-pct" style="color:${col.color}">${pct}%</div>`;
    grid.appendChild(cell);
  });

  /* donut */
  const svg    = document.getElementById('donut-svg');
  const legend = document.getElementById('legend');
  svg.innerHTML = ''; legend.innerHTML = '';
  document.getElementById('d-total').textContent = total;
  const cx=75, cy=75, R=58, C=2*Math.PI*R;
  const bgC = document.createElementNS('http://www.w3.org/2000/svg','circle');
  bgC.setAttribute('cx',cx); bgC.setAttribute('cy',cy); bgC.setAttribute('r',R);
  bgC.setAttribute('fill','none'); bgC.setAttribute('stroke','rgba(255,255,255,.06)'); bgC.setAttribute('stroke-width','22');
  svg.appendChild(bgC);
  let offset = 0;
  COLS.forEach(col => {
    const n   = cards.filter(c => c.colId === col.id).length;
    const pct = total ? n / total : 0;
    if (pct > 0){
      const arc = document.createElementNS('http://www.w3.org/2000/svg','circle');
      arc.setAttribute('cx',cx); arc.setAttribute('cy',cy); arc.setAttribute('r',R);
      arc.setAttribute('fill','none'); arc.setAttribute('stroke',col.color); arc.setAttribute('stroke-width','22');
      arc.setAttribute('stroke-dasharray',`${pct*C} ${C}`);
      arc.setAttribute('stroke-dashoffset', C - offset);
      arc.setAttribute('transform',`rotate(-90 ${cx} ${cy})`);
      svg.appendChild(arc);
      offset += pct * C;
    }
    const row = document.createElement('div');
    row.className = 'leg-row';
    row.innerHTML = `<div class="leg-l"><div class="leg-dot" style="background:${col.color}"></div><span class="leg-name">${col.label}</span></div>
      <div class="leg-r"><span class="leg-n">${n}</span><span class="leg-pct">${total?Math.round(n/total*100):0}%</span></div>`;
    legend.appendChild(row);
  });

  /* completion */
  const done = cards.filter(c => c.colId === 'done').length;
  const dp   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('big-pct').textContent         = dp + '%';
  document.getElementById('pct-fill').style.width        = dp + '%';
  document.getElementById('completion-sub').textContent  = `${done} من ${total} مهمة مكتملة`;
}

/* ══════════════════════════════════════
   MODAL
   ══════════════════════════════════════ */
function openModal(col, cid){
  editing = cid != null ? cards.find(c => c.id === cid) : null;
  document.getElementById('modal-ttl').textContent      = editing ? 'تعديل المهمة' : 'مهمة جديدة';
  document.getElementById('f-title').value              = editing?.title    ?? '';
  document.getElementById('f-desc').value               = editing?.desc     ?? '';
  document.getElementById('f-col').value                = editing?.colId    ?? (col || 'backlog');
  document.getElementById('f-priority').value           = editing?.priority ?? 'med';
  document.getElementById('f-assignee').value           = editing?.assignee ?? '';
  document.getElementById('f-date').value               = editing?.date     ?? '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 80);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editing = null; }

async function saveCard(){
  const title = document.getElementById('f-title').value.trim();
  if (!title){ document.getElementById('f-title').focus(); return; }
  const data = {
    title,
    desc:     document.getElementById('f-desc').value.trim(),
    colId:    document.getElementById('f-col').value,
    priority: document.getElementById('f-priority').value,
    assignee: document.getElementById('f-assignee').value.trim(),
    date:     document.getElementById('f-date').value
  };
  if (editing){
    Object.assign(editing, data);
    render(); closeModal(); toast('تم التعديل ✓');
    try { await azUpdate(editing); }
    catch(e){ console.error('Azure update:', e); toast('⚠️ خطأ في التعديل'); }
  } else {
    const card = { id: genId(), ...data };
    cards.push(card);
    render(); closeModal(); toast('تمت الإضافة ✓');
    try { await azInsert(card); }
    catch(e){ console.error('Azure insert:', e); toast('⚠️ خطأ في الحفظ'); }
  }
}

document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
document.getElementById('f-title').addEventListener('keydown', e => { if (e.key === 'Enter') saveCard(); });

/* ══════════════════════════════════════
   CTX MENU
   ══════════════════════════════════════ */
function openCtx(e, cid){
  e.stopPropagation(); activeCtx = cid;
  const m = document.getElementById('ctx');
  m.classList.add('open');
  m.style.left = e.clientX + 'px'; m.style.top = e.clientY + 'px';
  requestAnimationFrame(() => {
    if (e.clientX + m.offsetWidth  > window.innerWidth)  m.style.left = (e.clientX - m.offsetWidth)  + 'px';
    if (e.clientY + m.offsetHeight > window.innerHeight) m.style.top  = (e.clientY - m.offsetHeight) + 'px';
  });
}
function closeCtx(){ document.getElementById('ctx').classList.remove('open'); }
document.addEventListener('click', closeCtx);
document.addEventListener('keydown', e => { if (e.key === 'Escape'){ closeModal(); closeCtx(); } });
function ctxEdit(){ closeCtx(); openModal(null, activeCtx); }

async function ctxDelete(){
  closeCtx();
  const id = activeCtx;
  cards = cards.filter(c => c.id !== id);
  render(); toast('تم الحذف');
  try { await azDelete(id); }
  catch(e){ console.error('Azure delete:', e); toast('⚠️ خطأ في الحذف'); }
}

/* ══════════════════════════════════════
   TOAST / UTILS
   ══════════════════════════════════════ */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

   INIT
   ══════════════════════════════════════ */
buildBoard();
azRefresh();
setInterval(azRefresh, 10000);
