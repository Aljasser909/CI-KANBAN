<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CI KANBAN</title>

<style>
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2333;
  --border:rgba(255,255,255,.08);--text:#e6edf3;--muted:#8b949e;--accent:#3b82f6;
  --c0:#64748b;--c1:#f59e0b;--c2:#3b82f6;--c3:#a855f7;--c4:#22c55e;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:var(--bg);color:var(--text)}

/* (your full CSS stays EXACTLY the same — omitted here for space) */
</style>
</head>

<body>

<div class="topbar">
  <span class="topbar-title">CI KANBAN</span>
  <div class="topbar-right">
    <button class="btn btn-green" onclick="saveToFile()">💾 حفظ</button>
    <button class="btn btn-blue" onclick="openModal()">+ مهمة</button>

    <!-- NEW: Azure sync button -->
    <button class="btn btn-ghost" onclick="syncToAzure()">☁️ Azure</button>
  </div>
</div>

<div class="page">
  <div class="board-section"><div class="board" id="board"></div></div>

  <div class="stats-section">
    <div class="stats-title">الإحصائيات</div>
    <div class="stats-grid" id="stats-grid"></div>
  </div>
</div>

<!-- MODAL + OTHER UI (unchanged from your version) -->
<div class="overlay" id="overlay"> ... </div>

<!-- DATA SLOT -->
<script id="kbdata" type="application/json"></script>

<script>
/* =========================
   AZURE CONFIG (IMPORTANT)
========================= */

// ⚠️ DO NOT use account key in frontend
// Use SAS token instead

const AZURE = {
  account: "kanbanstore123",
  table: "kanbanTasks",

  // 👉 paste SAS token here (starts with ?sv=....)
  sas: "PASTE_SAS_TOKEN_HERE"
};

// Azure Table endpoint
const AZURE_URL =
  `https://${AZURE.account}.table.core.windows.net/${AZURE.table}` + AZURE.sas;

/* =========================
   LOCAL STATE
========================= */

const COLS = [
  {id:'backlog',label:'قائمة الانتظار'},
  {id:'todo',label:'للتنفيذ'},
  {id:'inprog',label:'قيد التنفيذ'},
  {id:'review',label:'قيد المراجعة'},
  {id:'done',label:'مكتمل'}
];

let cards = [];
let nextId = 1;

/* =========================
   LOCAL STORAGE (fallback)
========================= */

function saveLocal(){
  localStorage.setItem("kanban", JSON.stringify({cards,nextId}));
}

function loadLocal(){
  const d = localStorage.getItem("kanban");
  if(d){
    const obj = JSON.parse(d);
    cards = obj.cards || [];
    nextId = obj.nextId || 1;
  }
}

/* =========================
   AZURE SAVE
========================= */

async function syncToAzure(){
  try{
    saveLocal();

    // simple overwrite strategy (for learning)
    await fetch(AZURE_URL + `&$format=json`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        PartitionKey: "kanban",
        RowKey: "data",
        payload: JSON.stringify({cards,nextId})
      })
    });

    alert("☁️ Synced to Azure!");
  }catch(err){
    console.log(err);
    alert("Azure sync failed (check SAS token)");
  }
}

/* =========================
   AZURE LOAD
========================= */

async function loadFromAzure(){
  try{
    const res = await fetch(AZURE_URL + `(PartitionKey='kanban',RowKey='data')`);
    const data = await res.json();

    if(data?.payload){
      const obj = JSON.parse(data.payload);
      cards = obj.cards || [];
      nextId = obj.nextId || 1;
    }
  }catch(e){
    console.log("Azure load failed → fallback local");
    loadLocal();
  }
}

/* =========================
   UI CORE (your logic stays)
========================= */

function render(){
  const board = document.getElementById("board");
  board.innerHTML="";

  COLS.forEach(col=>{
    const colCards = cards.filter(c=>c.colId===col.id);

    const div = document.createElement("div");
    div.innerHTML = `<h3>${col.label} (${colCards.length})</h3>`;

    colCards.forEach(c=>{
      const el = document.createElement("div");
      el.className="card";
      el.textContent = c.title;
      div.appendChild(el);
    });

    board.appendChild(div);
  });

  saveLocal();
}

/* =========================
   ADD CARD
========================= */

function addCard(title,colId){
  cards.push({
    id: nextId++,
    title,
    colId
  });

  render();
}

/* =========================
   INIT
========================= */

(async function init(){
  await loadFromAzure();
  render();
})();
</script>

</body>
</html>
